<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<title>Mark Likes BBQ Bacon Calculator</title>
<style>
body{margin:0;font-family:system-ui;background:#111;color:#eee}
header{background:#1a1a1a;padding:14px;text-align:center;position:sticky;top:0}
nav{display:flex;background:#222}
nav button{flex:1;padding:12px;border:0;background:#222;color:#fff}
nav button.active{background:#c65a1e}
.page{display:none;padding:12px}.page.active{display:block}
.card{background:#1e1e1e;border-radius:10px;padding:12px;margin:10px 0}
input,select{width:100%;padding:10px;margin:4px 0;background:#2c2c2c;color:#fff;border:1px solid #555;border-radius:6px}
button.action{width:100%;padding:12px;background:#c65a1e;color:#fff;border:0;border-radius:6px}
table{width:100%} td{padding:4px}
.small{font-size:.9em;color:#bbb}
</style></head><body>
<header><h2>Mark Likes BBQ Bacon Calculator</h2></header>
<nav>
<button class="tab active" data-page="calc">Calculator</button>
<button class="tab" data-page="recipes">Recipes</button>
<button class="tab" data-page="schedule">Schedule</button>
<button class="tab" data-page="history">History</button>
</nav>

<section id="calc" class="page active">
<div class="card">
<h3>Weight</h3>
<select id="unit"><option>grams</option><option>lb/oz</option></select>
<input id="grams" placeholder="grams">
<input id="lbs" placeholder="pounds">
<input id="oz" placeholder="ounces">
<h3>Cure %</h3><input id="pct" value="3">
<button class="action" onclick="calc()">Calculate</button>
</div>
<div class="card" id="results">Results appear here.</div>
</section>

<section id="recipes" class="page">
<div class="card">
<h3>Master Recipe</h3>
<input id="salt" value="400"><input id="sugar" value="200"><input id="pink" value="60">
<input id="garlic" value="15"><input id="pepper" value="15"><input id="sage" value="5"><input id="flakes" value="5">
<button class="action" onclick="saveRecipe()">Save Recipe</button>
</div>
</section>

<section id="schedule" class="page">
<div class="card">
<h3>Cure Schedule</h3>
<input type="date" id="start">
<select id="days"><option>5</option><option selected>7</option><option>10</option><option>14</option></select>
<button class="action" onclick="schedule()">Calculate Dates</button>
<div id="sched"></div>
</div>
</section>

<section id="history" class="page">
<div class="card"><h3>Batch History</h3><div id="historyList">No batches saved.</div></div>
</section>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
b.classList.add('active'); document.getElementById(b.dataset.page).classList.add('active');
});

function recipe(){
return {
Salt:+salt.value,Sugar:+sugar.value,"Pink Salt":+pink.value,
Garlic:+garlic.value,"Black Pepper":+pepper.value,Sage:+sage.value,"Pepper Flakes":+flakes.value
};}

function saveRecipe(){localStorage.recipe=JSON.stringify(recipe()); alert("Recipe saved");}

function loadRecipe(){
let r=JSON.parse(localStorage.recipe||'null'); if(!r)return;
salt.value=r.Salt;sugar.value=r.Sugar;pink.value=r["Pink Salt"];garlic.value=r.Garlic;pepper.value=r["Black Pepper"];sage.value=r.Sage;flakes.value=r["Pepper Flakes"];
}

function calc(){
let g=+grams.value||0;
if(unit.value==='lb/oz'){g=(+lbs.value||0)*453.592+(+oz.value||0)*28.3495;}
let mix=g*(+pct.value/100);
let r=recipe(); let total=Object.values(r).reduce((a,b)=>a+b,0);
let h=`<h3>Total Cure Mix ${mix.toFixed(2)} g</h3><table>`;
for(let k in r){h+=`<tr><td>${k}</td><td>${(mix*r[k]/total).toFixed(2)} g</td></tr>`;}
results.innerHTML=h+'</table>';
let hist=JSON.parse(localStorage.history||'[]');
hist.unshift({date:new Date().toLocaleString(),weight:g,mix:mix.toFixed(2)});
localStorage.history=JSON.stringify(hist.slice(0,50));
renderHistory();
}

function schedule(){
let d=new Date(start.value); if(isNaN(d)) return;
let daysN=+days.value; let ready=new Date(d); ready.setDate(ready.getDate()+daysN);
sched.innerHTML=`<p>Start: ${d.toDateString()}</p><p>Ready: ${ready.toDateString()}</p>`;
}

function renderHistory(){
let hist=JSON.parse(localStorage.history||'[]');
historyList.innerHTML=hist.length?hist.map(x=>`<div class=small>${x.date} - ${x.weight.toFixed?x.weight.toFixed(0):x.weight}g - mix ${x.mix}g</div>`).join(''):'No batches saved.';
}
loadRecipe(); renderHistory();
</script></body></html>
