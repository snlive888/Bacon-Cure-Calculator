<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <title>Mark Likes BBQ</title>
    <style>
        :root {
            --bg: #000000; --card: #121212; --card-inner: #1c1c1e;
            --accent: #ff7a00; --text: #ffffff; --muted: #8e8e93;
            --safe-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif;
            padding-bottom: calc(100px + var(--safe-bottom));
        }
        .page { padding: 20px; display: none; max-width: 500px; margin: 0 auto; }
        .active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Inputs & Steppers */
        .stepper { display: flex; background: var(--card-inner); border-radius: 12px; border: 1px solid #2c2c2e; overflow: hidden; margin-bottom: 12px; }
        .stepper button { width: 50px; background: #2c2c2e; border: 0; color: white; font-size: 20px; font-weight: bold; cursor: pointer; }
        .stepper input { flex: 1; border: 0; background: none; text-align: center; padding: 14px; font-size: 18px; color: white; width: 100%; }
        
        input, select, textarea { 
            width: 100%; background: var(--card-inner); border: 1px solid #2c2c2e;
            border-radius: 12px; padding: 14px; color: white; font-size: 16px; margin-bottom: 10px;
        }

        /* Progress Dashboard */
        .progress-container { background: var(--card); border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid var(--accent); }
        .progress-bar { height: 12px; background: #222; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s ease; }
        
        /* Navigation */
        .nav { 
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(18,18,18,0.96);
            backdrop-filter: blur(20px); display: flex; border-top: 1px solid #2c2c2e;
            padding: 10px 0 calc(10px + var(--safe-bottom)); z-index: 1000;
        }
        .nav button { flex: 1; background: none; border: 0; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; }
        .nav button svg { width: 22px; height: 22px; fill: currentColor; }
        .nav .on { color: var(--accent); }

        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid #1c1c1e; }
        label { color: var(--muted); font-size: 11px; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 8px; letter-spacing: 0.5px; }
        .btn-main { width: 100%; background: var(--accent); color: black; border: 0; padding: 18px; border-radius: 14px; font-weight: 800; margin-top: 10px; font-size: 16px; cursor: pointer; }
        .btn-sub { background: #2c2c2e; color: white; padding: 10px; border-radius: 8px; border: 0; font-size: 12px; cursor: pointer; }
        
        .row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #1c1c1e; }
        .row:last-child { border:0; }
        .row span { color: var(--muted); font-size: 15px; }
        .row b { color: #fff; font-size: 15px; }
        
        #new-recipe-modal { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:2000; padding:20px; overflow-y:auto; }
    </style>
</head>
<body>

<section id="calc" class="page active">
    <header><h1 style="text-align:center">Calculator</h1></header>
    <div class="card">
        <label>Pounds / Ounces</label>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input id="lbs" type="number" inputmode="decimal" placeholder="Lbs" oninput="calc()">
            <input id="oz" type="number" inputmode="decimal" placeholder="Oz" oninput="calc()">
        </div>
        <label>Cure Length (Days)</label>
        <div class="stepper">
            <button onclick="step('days', -1)">−</button>
            <input id="days" type="number" value="7" oninput="calc()">
            <button onclick="step('days', 1)">+</button>
        </div>
    </div>
    <div class="card">
        <label>Recipe Profile</label>
        <select id="profile" onchange="calc()"></select>
        <label>Cure Intensity (%)</label>
        <input id="pct" type="number" value="3.0" step="0.1" oninput="calc()">
        <button class="btn-main" onclick="startCure()">START ACTIVE CURE</button>
    </div>
    <div id="results-area"></div>
</section>

<section id="dashboard" class="page">
    <header><h1 style="text-align:center">Active Cure</h1></header>
    <div id="active-cure-content">
        <p style="text-align:center; color:var(--muted); margin-top: 40px;">No active cure found.</p>
    </div>
</section>

<section id="recipes" class="page">
    <header><h1 style="text-align:center">Recipes</h1></header>
    <button class="btn-main" style="margin-bottom:20px;" onclick="openModal()">+ ADD NEW RECIPE</button>
    <div id="recipeList"></div>
</section>

<div id="new-recipe-modal">
    <h2>New Recipe</h2>
    <label>Recipe Name</label>
    <input id="new-name" placeholder="e.g. Maple Bourbon Bacon">
    <label>Notes</label>
    <textarea id="new-notes" placeholder="Optional notes..."></textarea>
    
    <label>Ingredients (Parts/Grams)</label>
    <div id="new-ingredients-list">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input placeholder="Ingredient" class="ing-n">
            <input type="number" placeholder="Value" class="ing-v" style="width:100px;">
        </div>
    </div>
    <button class="btn-sub" onclick="addIngRow()">+ Add Ingredient</button>
    <div style="margin-top:40px; display:flex; gap:10px;">
        <button class="btn-main" style="background:#333; color:white;" onclick="closeModal()">CANCEL</button>
        <button class="btn-main" onclick="saveRecipe()">SAVE RECIPE</button>
    </div>
</div>

<nav class="nav">
    <button class="tab on" data-p="calc"><svg viewBox="0 0 24 24"><path d="M19,3H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V5C21,3.9,20.1,3,19,3z M13,7h1v2h-1V7z M13,11h1v2h-1V11z M13,15h1v2h-1V15z M11,7h1v2h-1V7z M11,11h1v2h-1V11z M11,15h1v2h-1V15z M9,7h1v2H9V7z M9,11h1v2H9V11z M9,15h1v2H9V15z M7,7h1v2H7V7z M7,11h1v2H7V11z M7,15h1v2H7V15z M17,17h-2v-2h2V17z M17,13h-2v-2h2V13z M17,9h-2V7h2V9z"/></svg>Calc</button>
    <button class="tab" data-p="dashboard"><svg viewBox="0 0 24 24"><path d="M13,3h-2v10h2V3z M17.83,5.17l-1.42,1.42C17.99,7.86,19,9.81,19,12c0,3.87-3.13,7-7,7s-7-3.13-7-7c0-2.19,1.01-4.14,2.58-5.42 L6.17,5.17C4.23,6.82,3,9.26,3,12c0,4.97,4.03,9,9,9s9-4.03,9-9C21,9.26,19.77,6.82,17.83,5.17z"/></svg>Progress</button>
    <button class="tab" data-p="recipes"><svg viewBox="0 0 24 24"><path d="M18,2H6C4.9,2,4,2.9,4,4v16c0,1.1,0.9,2,2,2h12c1.1,0,2-0.9,2-2V4C20,2.9,19.1,2,18,2z M13,12H7v-1h6V12z M15,9H7V8h8V9z"/></svg>Recipes</button>
</nav>

<script>
const defaultRecipe = {
    name: "Chuds BBQ Bacon Cure",
    notes: "Classic all-purpose cure.",
    ingredients: { "Salt": 400, "Sugar": 200, "Pink Salt": 60, "Garlic": 15, "Black Pepper": 15, "Sage": 5, "Pepper Flakes": 5 }
};

if (!localStorage.recipes) localStorage.recipes = JSON.stringify([defaultRecipe]);

function haptic() { if (navigator.vibrate) navigator.vibrate(10); }

function step(id, val) {
    const el = document.getElementById(id);
    el.value = Math.max(0, (parseFloat(el.value) || 0) + val);
    haptic(); calc();
}

function calc() {
    const grams = (parseFloat(lbs.value) || 0) * 453.592 + (parseFloat(oz.value) || 0) * 28.3495;
    const mixNeeded = grams * ((parseFloat(pct.value) || 0) / 100);
    const recipes = JSON.parse(localStorage.recipes);
    const r = recipes[profile.value || 0];
    
    if (grams <= 0) { document.getElementById('results-area').innerHTML = ""; return; }

    const ings = r.ingredients;
    const totalParts = Object.values(ings).reduce((a, b) => a + b, 0);

    let html = `<div class="progress-container" style="text-align:center; border-color:var(--accent)">
                <label style="color:var(--accent)">Total Mix Needed</label>
                <span style="font-size:42px; font-weight:900; color:var(--accent); display:block">${mixNeeded.toFixed(2)}g</span></div>
                <div class="card" style="margin-top:16px;">`;
    
    Object.keys(ings).forEach(k => {
        const weight = (mixNeeded * (ings[k] / totalParts)).toFixed(2);
        html += `<div class="row"><span>${k}</span><b>${weight} g</b></div>`;
    });
    document.getElementById('results-area').innerHTML = html + "</div>";
}

function openModal() { document.getElementById('new-recipe-modal').style.display = 'block'; }
function closeModal() { document.getElementById('new-recipe-modal').style.display = 'none'; }

function addIngRow() {
    const div = document.createElement('div');
    div.style.display = 'flex'; div.style.gap = '10px'; div.style.marginBottom = '10px';
    div.innerHTML = `<input placeholder="Ingredient" class="ing-n"><input type="number" placeholder="Value" class="ing-v" style="width:100px;">`;
    document.getElementById('new-ingredients-list').appendChild(div);
}

function saveRecipe() {
    const name = document.getElementById('new-name').value;
    const notes = document.getElementById('new-notes').value;
    const names = document.querySelectorAll('.ing-n');
    const vals = document.querySelectorAll('.ing-v');
    let ingredients = {};
    
    names.forEach((n, i) => {
        if(n.value && vals[i].value) ingredients[n.value] = parseFloat(vals[i].value);
    });

    if(!name || Object.keys(ingredients).length === 0) { alert("Please enter a name and ingredients."); return; }

    const recipes = JSON.parse(localStorage.recipes);
    recipes.push({ name, notes, ingredients });
    localStorage.recipes = JSON.stringify(recipes);
    
    closeModal();
    refreshRecipeTab();
    alert("Recipe Saved!");
}

function startCure() {
    const cureDays = parseInt(days.value) || 7;
    const rName = JSON.parse(localStorage.recipes)[profile.value].name;
    localStorage.activeCure = JSON.stringify({ start: Date.now(), days: cureDays, name: rName });
    haptic(); alert("Cure started!");
}

function updateDashboard() {
    if (!localStorage.activeCure) return;
    const data = JSON.parse(localStorage.activeCure);
    const elapsed = (Date.now() - data.start) / (1000 * 60 * 60 * 24);
    const pct = Math.min(100, Math.max(0, (elapsed / data.days) * 100)).toFixed(1);
    document.getElementById('active-cure-content').innerHTML = `
        <div class="progress-container">
            <label>${data.name}</label>
            <div style="font-size:28px; font-weight:900; margin: 10px 0;">${pct}% Done</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <button class="btn-main" style="background:#222; color:white;" onclick="localStorage.removeItem('activeCure'); updateDashboard();">CLEAR CURE</button>
        </div>`;
}

function refreshRecipeTab() {
    const rs = JSON.parse(localStorage.recipes);
    profile.innerHTML = rs.map((r, i) => `<option value="${i}">${r.name}</option>`).join("");
    recipeList.innerHTML = rs.map(r => {
        const total = Object.values(r.ingredients).reduce((a,b)=>a+b, 0);
        const rows = Object.keys(r.ingredients).map(k => `
            <div class="row"><span>${k}</span><b style="color:var(--accent)">${((r.ingredients[k]/total)*100).toFixed(1)}%</b></div>
        `).join("");
        return `<div class="card"><h3>${r.name}</h3><p style="color:var(--muted); font-size:13px;">${r.notes}</p>${rows}</div>`;
    }).join("");
}

document.querySelectorAll(".tab").forEach(btn => {
    btn.onclick = () => {
        haptic();
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("on"));
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        btn.classList.add("on");
        document.getElementById(btn.dataset.p).classList.add("active");
        if (btn.dataset.p === 'dashboard') updateDashboard();
        if (btn.dataset.p === 'recipes') refreshRecipeTab();
    };
});

refreshRecipeTab(); calc();
</script>
</body>
</html>
