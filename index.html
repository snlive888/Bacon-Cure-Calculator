
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#121212">
<link rel="manifest" href="manifest.json">
<title>Mark Likes BBQ Bacon Calculator</title>
<style>
body{margin:0;background:#121212;color:#eee;font-family:system-ui}
header{background:#1b1b1b;padding:14px;text-align:center}
.page{display:none;padding:16px;padding-bottom:80px}.active{display:block}
.card{background:#1f1f1f;border-radius:12px;padding:14px;margin-bottom:12px}
input,select,textarea{width:100%;box-sizing:border-box;padding:10px;margin:6px 0;background:#2b2b2b;color:#fff;border:1px solid #555;border-radius:8px}
button{padding:10px;border:0;border-radius:8px}
.primary{width:100%;background:#d06a2b;color:#fff}
nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#1b1b1b}
nav button{flex:1;background:#1b1b1b;color:#fff}
nav .on{background:#d06a2b}
</style>
</head>
<body>
<header><h2>Mark Likes BBQ</h2><div>Bacon Calculator</div></header>

<section id="calc" class="page active">
<div class="card">
<input id="lbs" type="number" placeholder="Pounds">
<input id="oz" type="number" placeholder="Ounces">
<input id="pct" type="number" value="3" placeholder="Cure %">
<select id="profile"></select>
<button class="primary" onclick="calc()">Calculate</button>
</div>
<div class="card" id="results">Results appear here.</div>
<button class="primary" onclick="saveBatch()">Save Batch</button>
</section>

<section id="recipes" class="page">
<div class="card">
<input id="rname" placeholder="Recipe Name">
<input id="salt" value="400"><input id="sugar" value="200"><input id="pink" value="60">
<input id="garlic" value="15"><input id="pepper" value="15"><input id="sage" value="5"><input id="flakes" value="5">
<textarea id="notes" placeholder="Recipe notes"></textarea>
<button class="primary" onclick="saveRecipe()">Save Recipe Profile</button>
</div>
</section>

<section id="history" class="page"><div class="card" id="historyList">No saved batches.</div></section>
<section id="settings" class="page"><div class="card"><button class="primary" onclick="resetAll()">Reset All Data</button></div></section>

<nav>
<button class="tab on" data-p="calc">🏠</button>
<button class="tab" data-p="recipes">📖</button>
<button class="tab" data-p="history">🗂</button>
<button class="tab" data-p="settings">⚙</button>
</nav>

<script>
const defaultRecipe={name:"Original Bacon Cure",Salt:400,Sugar:200,"Pink Salt":60,Garlic:15,"Black Pepper":15,Sage:5,"Pepper Flakes":5,notes:"Original bacon cure"};
if(!localStorage.recipes){localStorage.recipes=JSON.stringify([defaultRecipe]);}

function getRecipes(){return JSON.parse(localStorage.recipes);}
function refreshProfiles(){profile.innerHTML=getRecipes().map((r,i)=>`<option value="${i}">${r.name}</option>`).join('');}
function currentRecipe(){return getRecipes()[profile.value||0];}

function calc(){
 let g=(+lbs.value||0)*453.592+(+oz.value||0)*28.3495;
 let mix=g*((+pct.value||3)/100);
 let r=currentRecipe();
 let total=r.Salt+r.Sugar+r["Pink Salt"]+r.Garlic+r["Black Pepper"]+r.Sage+r["Pepper Flakes"];
 let h=`<h3>Total Cure Mix: ${mix.toFixed(2)} g</h3><table>`;
 ["Salt","Sugar","Pink Salt","Garlic","Black Pepper","Sage","Pepper Flakes"].forEach(k=>{
   h+=`<tr><td>${k}</td><td>${(mix*r[k]/total).toFixed(2)} g</td></tr>`;
 });
 results.innerHTML=h+"</table><p>"+(r.notes||"")+"</p>";
 window.lastBatch={weight:`${lbs.value} lb ${oz.value} oz`,pct:pct.value,recipe:r.name,mix:mix.toFixed(2),date:new Date().toLocaleString()};
}

function saveBatch(){
 if(!window.lastBatch){alert("Calculate first");return;}
 let h=JSON.parse(localStorage.history||"[]");
 h.unshift(window.lastBatch);
 localStorage.history=JSON.stringify(h);
 renderHistory();
}

function saveRecipe(){
 let rs=getRecipes();
 rs.push({
  name:rname.value||"New Recipe",
  Salt:+salt.value,Sugar:+sugar.value,"Pink Salt":+pink.value,Garlic:+garlic.value,
  "Black Pepper":+pepper.value,Sage:+sage.value,"Pepper Flakes":+flakes.value,notes:notes.value
 });
 localStorage.recipes=JSON.stringify(rs);
 refreshProfiles();
 alert("Recipe saved");
}

function renderHistory(){
 let h=JSON.parse(localStorage.history||"[]");
 historyList.innerHTML=h.length?h.map(x=>`<div>${x.date}<br>${x.weight} | ${x.recipe} | ${x.mix} g mix</div><hr>`).join(""):"No saved batches.";
}

function resetAll(){ if(confirm("Reset all data?")){localStorage.clear(); location.reload();} }

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
 document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
 b.classList.add('on'); document.getElementById(b.dataset.p).classList.add('active');
});

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
refreshProfiles(); renderHistory();
</script>
</body></html>
