<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0f1115">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Mark Likes BBQ Bacon Calculator</title>
<style>
:root{
--bg:#0f1115;--card:#1a1d24;--card2:#222632;
--accent:#ff7a00;--text:#f4f4f4;--muted:#a5aab3;
}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif}
.hero{padding:32px 20px;text-align:center}
.logo{font-size:54px}
.hero h1{margin:8px 0 0;font-size:32px}
.hero p{color:var(--muted);margin-top:8px}
.page{padding:16px 16px 100px;display:none}.active{display:block}
.card{background:var(--card);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.card h3{margin-top:0}
label{display:block;color:var(--muted);margin-top:8px;margin-bottom:4px}
input,select,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid #333;background:var(--card2);color:white}
.btn{width:100%;padding:16px;border:0;border-radius:16px;background:linear-gradient(#ff8a1f,#d55f00);color:white;font-weight:700;margin-top:12px}
.resultrow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #333}
.nav{position:fixed;bottom:18px;left:16px;right:16px;background:rgba(26,29,36,.92);backdrop-filter:blur(18px);border-radius:22px;display:flex;padding:8px}
.nav button{flex:1;background:none;border:0;color:white;padding:12px;border-radius:14px}
.nav .on{background:var(--accent)}
.recipe{background:var(--card2);padding:12px;border-radius:14px;margin:8px 0}
.small{color:var(--muted)}
</style>
</head>
<body>
<div class="hero">
<div class="logo">🔥</div>
<h1>Mark Likes BBQ</h1>
<p>Bacon Calculator</p>
</div>

<section id="calc" class="page active">
<div class="card">
<h3>🥓 Pork Belly Weight</h3>
<label>Pounds</label><input id="lbs" type="number" value="5">
<label>Ounces</label><input id="oz" type="number" value="0">
</div>
<div class="card">
<h3>🧂 Cure Settings</h3>
<label>Cure Percentage (% of meat weight)</label><input id="pct" type="number" value="3" step="0.1">
<label>Recipe Profile</label><select id="profile"></select>
<button class="btn" onclick="calc()">CALCULATE CURE</button>
</div>
<div class="card" id="results">Enter weight and calculate.</div>
</section>

<section id="recipes" class="page">
<div class="card"><h3>📖 Saved Recipes</h3><div id="recipeList"></div></div>
</section>

<section id="settings" class="page">
<div class="card"><h3>⚙ Settings</h3><button class="btn" onclick="localStorage.clear();location.reload()">Reset All Data</button></div>
</section>

<div class="nav">
<button class="tab on" data-p="calc">🏠</button>
<button class="tab" data-p="recipes">📖</button>
<button class="tab" data-p="settings">⚙</button>
</div>

<script>
const d={name:"Original Bacon Cure",notes:"Classic all-purpose bacon cure.",Salt:400,Sugar:200,"Pink Salt":60,Garlic:15,"Black Pepper":15,Sage:5,"Pepper Flakes":5};
if(!localStorage.recipes){localStorage.recipes=JSON.stringify([d]);}
function rs(){return JSON.parse(localStorage.recipes)}
function refresh(){
profile.innerHTML=rs().map((r,i)=>`<option value="${i}">${r.name}</option>`).join("");
recipeList.innerHTML=rs().map(r=>`<div class="recipe"><b>${r.name}</b><div class="small">${r.notes||""}</div></div>`).join("");
}
function calc(){
let g=(+lbs.value||0)*453.592+(+oz.value||0)*28.3495;
let mix=g*((+pct.value||3)/100);
let r=rs()[profile.value||0];
let total=r.Salt+r.Sugar+r["Pink Salt"]+r.Garlic+r["Black Pepper"]+r.Sage+r["Pepper Flakes"];
let h=`<h3>Total Cure Mix</h3><div style="font-size:34px;font-weight:700">${mix.toFixed(2)} g</div>`;
["Salt","Sugar","Pink Salt","Garlic","Black Pepper","Sage","Pepper Flakes"].forEach(k=>{
h+=`<div class='resultrow'><span>${k}</span><span>${(mix*r[k]/total).toFixed(2)} g</span></div>`;
});
results.innerHTML=h;
}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
b.classList.add("on");document.getElementById(b.dataset.p).classList.add("active");
});
refresh();
</script>
</body></html>
