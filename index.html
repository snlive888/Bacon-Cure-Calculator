<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="theme-color" content="#0f1115">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-180.png">
    <title>Mark Likes BBQ</title>
    <style>
        :root {
            --bg: #000000; /* Pure black for that OLED look */
            --card: #121212;
            --card-inner: #1c1c1e;
            --accent: #ff7a00;
            --text: #ffffff;
            --muted: #8e8e93;
            --safe-bottom: env(safe-area-inset-bottom);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.4;
        }

        /* Fixed Navigation - Matches Mockup */
        .nav { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(20px);
            display: flex; 
            padding: 10px 0 calc(10px + var(--safe-bottom));
            border-top: 1px solid #2c2c2e;
            z-index: 1000;
        }
        .nav button { 
            flex: 1; background: none; border: 0; color: var(--muted);
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            font-size: 10px; font-weight: 500;
        }
        .nav button svg { width: 24px; height: 24px; fill: currentColor; }
        .nav .on { color: var(--accent); }

        /* Page Layout */
        .page { padding: 20px 20px 120px; display: none; }
        .active { display: block; }
        
        header { text-align: center; padding: 40px 0 20px; }
        .logo-img { width: 120px; height: auto; margin-bottom: 10px; }

        /* Cards & Inputs - Mockup Style */
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .label-group { display: flex; justify-content: space-between; margin-bottom: 8px; }
        label { color: var(--muted); font-size: 12px; text-transform: uppercase; font-weight: 700; }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        input, select { 
            width: 100%; background: var(--card-inner); border: 1px solid #2c2c2e;
            border-radius: 10px; padding: 14px; color: white; font-size: 17px;
        }

        /* Result Section */
        .total-box { 
            background: linear-gradient(145deg, #1c1c1e, #121212);
            border-radius: 12px; padding: 20px; text-align: center; margin: 20px 0;
            border: 1px solid var(--accent);
        }
        .total-label { color: var(--accent); font-size: 12px; font-weight: 700; }
        .total-val { font-size: 32px; font-weight: 800; display: block; color: var(--accent); }

        .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2c2c2e; font-size: 15px; }
        .row span:last-child { font-weight: 600; color: #fff; }

        .btn-main {
            width: 100%; background: var(--accent); color: black; border: 0;
            padding: 16px; border-radius: 12px; font-weight: 700; font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<section id="calc" class="page active">
    <header>
        <h1>Calculator</h1>
    </header>

    <div class="card">
        <label>Weight</label>
        <div class="input-row">
            <div>
                <label style="font-size: 10px;">Pounds</label>
                <input id="lbs" type="number" value="5" oninput="calc()">
            </div>
            <div>
                <label style="font-size: 10px;">Ounces</label>
                <input id="oz" type="number" value="8" oninput="calc()">
            </div>
        </div>
        
        <label>Cure Percentage</label>
        <input id="pct" type="number" value="3.00" step="0.05" oninput="calc()">
    </div>

    <div class="card">
        <label>Recipe</label>
        <select id="profile" onchange="calc()"></select>
        <button class="btn-main" onclick="calc()">CALCULATE</button>
    </div>

    <div id="results-area">
        </div>
</section>

<section id="recipes" class="page">
    <h2>Recipes</h2>
    <div id="recipeList"></div>
</section>

<section id="settings" class="page">
    <h2>Settings</h2>
    <button class="btn-main" style="background:#333; color:white" onclick="localStorage.clear(); location.reload();">Reset App</button>
</section>

<nav class="nav">
    <button class="tab on" data-p="calc">
        <svg viewBox="0 0 24 24"><path d="M19,3H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V5C21,3.9,20.1,3,19,3z M13,7h1v2h-1V7z M13,11h1v2h-1V11z M13,15h1v2h-1V15z M11,7h1v2h-1V7z M11,11h1v2h-1V11z M11,15h1v2h-1V15z M9,7h1v2H9V7z M9,11h1v2H9V11z M9,15h1v2H9V15z M7,7h1v2H7V7z M7,11h1v2H7V11z M7,15h1v2H7V15z M17,17h-2v-2h2V17z M17,13h-2v-2h2V13z M17,9h-2V7h2V9z"/></svg>
        Calculator
    </button>
    <button class="tab" data-p="recipes">
        <svg viewBox="0 0 24 24"><path d="M18,2H6C4.9,2,4,2.9,4,4v16c0,1.1,0.9,2,2,2h12c1.1,0,2-0.9,2-2V4C20,2.9,19.1,2,18,2z M13,12H7v-1h6V12z M15,9H7V8h8V9z"/></svg>
        Recipes
    </button>
    <button class="tab" data-p="settings">
        <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.91,7.62,6.29L5.23,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.72,8.87 c-0.11,0.2-0.06,0.47,0.12,0.61l2.03,1.58C4.84,11.36,4.81,11.68,4.81,12c0,0.33,0.02,0.65,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.11-0.2,0.06-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        Settings
    </button>
</nav>

<script>
// ... (Logic remains similar to previous, ensure function calc() targets results-area)
const d={name:"Original Bacon Cure",notes:"Classic all-purpose bacon cure with a balanced flavor.",Salt:1.71,Sugar:0.86,"Pink Salt":0.25,Garlic:0.06,"Black Pepper":0.06,Sage:0.02,RedPepper:0.02};
if(!localStorage.recipes){localStorage.recipes=JSON.stringify([d]);}

function calc(){
    let grams = (+lbs.value||0)*453.592 + (+oz.value||0)*28.3495;
    let mixTotal = grams * ((+pct.value||3)/100);
    let r = JSON.parse(localStorage.recipes)[profile.value||0];
    
    let h = `<div class="total-box">
                <span class="total-label">TOTAL CURE MIX NEEDED</span>
                <span class="total-val">${mixTotal.toFixed(2)}g</span>
             </div><div class="card">`;
    
    // Using the keys from your mockup
    const keys = ["Salt", "Sugar", "Pink Salt", "Garlic", "Black Pepper", "Sage", "RedPepper"];
    let sumParts = keys.reduce((s,k)=>s+(r[k]||0), 0);
    
    keys.forEach(k => {
        let val = (mixTotal * (r[k]/sumParts)).toFixed(2);
        h += `<div class="row"><span>${k}</span><span>${val}g</span></div>`;
    });
    h += `</div>`;
    document.getElementById('results-area').innerHTML = h;
}

// Tab Switching
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
    document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
    b.classList.add("on"); document.getElementById(b.dataset.p).classList.add("active");
});

// Setup
profile.innerHTML = JSON.parse(localStorage.recipes).map((r,i)=>`<option value="${i}">${r.name}</option>`).join("");
calc();
</script>
</body>
</html>
